<!DOCTYPE html>
<html lang="en">
<head>

      font-family: Arial, Helvetica, sans-serif;

      border-radius: 26px;
      padding: 44px 34px;
      box-shadow: 0 24px 70px rgba(0,0,0,.48);

    img { width: 130px; margin: 0 auto 22px; display: block; }

    a {
      display: inline-block;
      background: linear-gradient(135deg, #f5b21b, #f28c18);
      color: #000;
      font-weight: 800;
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 999px;
    }
